[tips-and-tricks-item-name]
halo-solar-halo-briefing=Near solar orbit
halo-compute=Overheating

[tips-and-tricks-item-description]
halo-solar-halo-briefing=Approaching closer to the sun allows for much more efficient solar power collection but comes with risks. The space connection is cleared of asteroids but has [entity=halo-flare] that are resistant to conventional weaponry. Lasers or electric weaponry are advised. Additionally, the pull of the sun gets stronger as you approach. Without a renewable source of fuel, it may be prudent to limit travel distance based on fuel reserves. The connection uses a flight condition, so space platforms can turn around midway.
halo-compute=Some entities like the [entity=halo-computer] will stop operating if they get too hot. [entity=heat-pipe] can be used to transfer heat away to a [entity=halo-heatsink] to keep the temperature down. Once unlocked, [entity=halo-heatpump] can be used to concentrate the heat to allow higher temperature uses like a [entity=heat-exchanger].
