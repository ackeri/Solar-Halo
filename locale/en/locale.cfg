[technology-description]
halo-discovery-solar=Chart a path to a near solar orbit, with massive solar exposure. The space is cleared of asteroids but has plasma flares that are resistant to conventional weaponry. The high gravity and low resources make for a somewhat dangerous space route.
halo-compute=Allows study using advanced computation
halo-terminal=Careful management allows electrolyte to be charged with massive amounts of energy. Charged electrolyte is significantly less corrosive and can be barrelled. 
halo-nav-computer=Compute precise paths through the debris fields to reduce encounters with asteroids. 
halo-rocket=Use precise weather and physics simulations to reduce the need for inflight adjustments.
halo-module=Use advanced simulation to specialize modules to a particular environment, doubling their effect for a while.
halo-speed=Increase the crafting speed of the supercomputer
halo-heatsink-high=Allows advanced heat management
halo-solar=Concentrate solar rays to increase the amount of solar power you can collect in solar panels. Changes power output for all forces, only the highest research level from all active forces is used.
halo-gmo=Create a sterile, but productive plant from seeds.
halo-sim=Use expensive simulations to create science.

