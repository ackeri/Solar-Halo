[technology-description]
halo-discovery-solar=Wyznacz trasę na bliską orbitę słoneczną o ogromnym nasłonecznieniu. Przestrzeń jest oczyszczona z asteroid, ale występują tam rozbłyski plazmy odporne na konwencjonalne uzbrojenie. Silna grawitacja i skromne zasoby czynią tę trasę niebezpieczną.
halo-compute=Umożliwia prowadzenie badań przy użyciu zaawansowanych obliczeń.
halo-terminal=Przy odpowiednim zarządzaniu elektrolit można naładować ogromną ilością energii. Naładowany elektrolit jest znacznie mniej korozyjny i może być beczkowany.
halo-nav-computer=Wykorzystaj precyzyjne wyliczanie tras przez pola odłamków, aby ograniczyć spotkania z asteroidami.
halo-rocket=Wykorzystaj precyzyjne symulacje pogody i fizyki, by zmniejszyć potrzebę korekt w trakcie lotu. Znacznie obniża koszt jednostek przetwarzających i lekko zmniejsza koszt innych komponentów.
halo-module=Użyj zaawansowanych symulacji, by wyspecjalizować moduły pod konkretne warunki i czasowo podwoić ich efekt.
halo-speed=Zwiększa szybkość wytwarzania superkomputera.
halo-heatsink-high=Odblokowuje zaawansowane zarządzanie ciepłem.
halo-solar=Skoncentruj promienie słoneczne, aby zwiększyć produkcję energii paneli słonecznych. Zmiana dotyczy wszystkich frakcji; używany jest najwyższy poziom badań spośród aktywnych frakcji.
halo-gmo=Stwórz sterylną, ale wydajną roślinę z nasion.
halo-sim=Użyj kosztownych symulacji do tworzenia pakietów naukowych.

