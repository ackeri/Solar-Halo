[tips-and-tricks-item-description]
halo-solar-halo-briefing=Podejście bliżej Słońca pozwala znacznie zwiększyć wydajność paneli słonecznych, ale wiąże się z ryzykiem. Połączenie kosmiczne jest oczyszczone z asteroid, jednak występują [entity=halo-flare], odporne na konwencjonalne uzbrojenie. Zalecana jest broń laserowa lub elektryczna. Dodatkowo przyciąganie Słońca rośnie wraz ze zbliżaniem się. Bez odnawialnego źródła paliwa warto ograniczać dystans lotu do zapasów paliwa. Połączenie używa warunku lotu, więc platformy mogą zawrócić w połowie trasy.
halo-compute=Niektóre encje, jak [entity=halo-computer], przestają działać po przegrzaniu. [entity=heat-pipe] można użyć do odprowadzania ciepła do [entity=halo-heatsink], aby utrzymać temperaturę. Po odblokowaniu [entity=halo-heatpump] można skoncentrować ciepło i użyć go przy wyższych temperaturach, np. w [entity=heat-exchanger].
