[entity-description]
halo-computer=Zużywa ogromne ilości energii i oddaje 50% w postaci ciepła. Do pracy wymaga temperatury poniżej 200 stopni. Ignoruje sygnały z beaconów.
halo-terminal=Ładuj i rozładowuj elektrolit.
halo-heatpump=Przenosi ciepło, aby osiągać wyższe temperatury. Wejście musi mieć co najmniej 40 stopni.
halo-heatsink=Odprowadza lub przenosi ciepło. Jedno wejście ciepła służy do receptur niskotemperaturowych, drugie do wysokotemperaturowych.
halo-thermostat=Mierzy temperaturę.
halo-nav-computer=Korzysta z map gwiezdnych, by unikać kolizji z asteroidami.
halo-flare=Duży rozbłysk plazmy. Odporny na konwencjonalną broń.
halo-gmo=Sterylne drzewo łączące geny yumako i jellynut. Produkuje biofluks.

